version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: backd-postgres
    environment:
      POSTGRES_DB: backd_platform
      POSTGRES_USER: backd
      POSTGRES_PASSWORD: backd123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backd"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: docker.io/minio/minio:latest
    container_name: backd-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 2s
      retries: 3

  minio-init:
    image: docker.io/minio/mc:latest
    container_name: backd-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/sleep 15;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/backd-apps --ignore-existing;
      /usr/bin/mc mb myminio/backd-functions --ignore-existing;
      /usr/bin/mc policy set public myminio/backd-apps;
      /usr/bin/mc policy set public myminio/backd-functions;
      exit 0;
      "

  api:
    image: backd_api:debug
    container_name: backd-api
    environment:
      BACKD_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1jaGFycy1sb25n
      DATABASE_URL: postgres://backd:backd123@postgres:5432/backd_platform
      BACKD_FUNCTIONS_URL: http://functions:8081
      LOG_LEVEL: debug
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./testdata/apps:/apps:ro
    entrypoint: ["/app/api"]
    command: ["start", "--config-dir", "/apps"]
    
  functions:
    build:
      context: .
      dockerfile: Dockerfile.functions
    container_name: backd-functions
    environment:
      BACKD_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1jaGFycy1sb25n
      DATABASE_URL: postgres://backd:backd123@postgres:5432/backd_platform
      BACKD_INTERNAL_URL: http://localhost:9191
      LOG_LEVEL: debug
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8081:8081"
      - "9191:9191"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./testdata/apps:/apps:ro
    entrypoint: ["/app/api"]
    command: ["functions", "--config-dir", "/apps"]
    
  worker:
    build:
      context: .
      dockerfile: Dockerfile.functions
    container_name: backd-worker
    environment:
      BACKD_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1jaGFycy1sb25n
      DATABASE_URL: postgres://backd:backd123@postgres:5432/backd_platform
      BACKD_INTERNAL_URL: http://localhost:9191
      LOG_LEVEL: debug
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./testdata/apps:/apps:ro
    entrypoint: ["/app/api"]
    command: ["functions", "--config-dir", "/apps", "--mode", "worker"]

volumes:
  pgdata:
  minio_data:

networks:
  default:
    name: backd-network
